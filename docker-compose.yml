services:
  postgres:
    image: postgres:16-alpine
    container_name: tutor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tutor
      POSTGRES_PASSWORD: tutor
      POSTGRES_DB: tutor
    ports:
      # Host port 55432 → container 5432 so we don't clash with a system Postgres.
      - "55432:5432"
    volumes:
      - tutor_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tutor -d tutor"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  tutor_pg_data:
