name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"

jobs:
  rust:
    name: rust
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tutor
          POSTGRES_PASSWORD: tutor
          POSTGRES_DB: tutor
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tutor -d tutor"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      # Integration tests use `#[sqlx::test]` which connects to this
      # base URL and provisions a fresh per-test database from it.
      DATABASE_URL: postgres://tutor:tutor@localhost:5432/tutor
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: api
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: test
        run: cargo test --all

  web:
    name: web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: install
        run: pnpm install --frozen-lockfile
      - name: typecheck
        run: pnpm typecheck
      - name: lint
        run: pnpm lint
      - name: test
        run: pnpm test
